<svg viewBox="0 0 800 2650" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .card { fill: #ffffff; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
      .step-badge { fill: #2d7a6e; }
      .step-text { fill: #333333; font-family: 'Arial', sans-serif; }
      .title-text { fill: #2d7a6e; font-family: 'Arial', sans-serif; font-weight: bold; }
      .connector-line { stroke: #2d7a6e; stroke-width: 3; fill: none; }
      .connector-dot { fill: #2d7a6e; }
      .highlight-box { fill: #e8f4f2; stroke: #2d7a6e; stroke-width: 2; }
      .section-header { fill: #2d7a6e; }
    </style>
    
    <!-- Gradient for badges -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d7a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f5449;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2d7a6e" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="2650" fill="#f8fafa"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="140" fill="#2d7a6e"/>
  <text x="400" y="70" text-anchor="middle" class="title-text" font-size="48" fill="white">Cryomot</text>
  <text x="400" y="105" text-anchor="middle" style="fill: rgba(255,255,255,0.9); font-family: Arial; font-size: 30px; font-weight: 600;">CRYOMOT User Guide</text>
  
  <!-- Main content starts -->
  <g transform="translate(0, 160)">
    
    <!-- SECTION 1: PREPARE & UPLOAD -->
    <rect x="60" y="20" width="680" height="60" rx="10" class="section-header"/>
    <text x="400" y="60" text-anchor="middle" style="fill: white; font-size: 24px; font-weight: bold; font-family: Arial;">📁 PREPARE & UPLOAD</text>
    
    <!-- Step 1 -->
    <rect x="60" y="100" width="680" height="140" rx="15" class="card"/>
    <circle cx="130" cy="170" r="35" fill="url(#badgeGrad)"/>
    <text x="130" y="182" text-anchor="middle" style="fill: white; font-size: 28px; font-weight: bold; font-family: Arial;">1</text>
    
    <text x="190" y="155" class="step-text" font-size="22" font-weight="bold">Convert to ZIP</text>
    <text x="190" y="185" class="step-text" font-size="16" fill="#666">Convert your tomogram folder into a</text>
    <text x="190" y="210" class="step-text" font-size="16" fill="#666">ZIP file if not already compressed</text>
    
    <!-- Connector -->
    <line x1="400" y1="240" x2="400" y2="280" class="connector-line" marker-end="url(#arrowhead)"/>
    
    <!-- Step 2 -->
    <rect x="60" y="280" width="680" height="140" rx="15" class="card"/>
    <circle cx="130" cy="350" r="35" fill="url(#badgeGrad)"/>
    <text x="130" y="362" text-anchor="middle" style="fill: white; font-size: 28px; font-weight: bold; font-family: Arial;">2</text>
    
    <text x="190" y="335" class="step-text" font-size="22" font-weight="bold">Click "Choose ZIP File"</text>
    <text x="190" y="365" class="step-text" font-size="16" fill="#666">Click the button to open the file</text>
    <text x="190" y="390" class="step-text" font-size="16" fill="#666">selection dialog</text>
    
    <!-- Connector -->
    <line x1="400" y1="420" x2="400" y2="460" class="connector-line" marker-end="url(#arrowhead)"/>
    
    <!-- Step 3 -->
    <rect x="60" y="460" width="680" height="140" rx="15" class="card"/>
    <circle cx="130" cy="530" r="35" fill="url(#badgeGrad)"/>
    <text x="130" y="542" text-anchor="middle" style="fill: white; font-size: 28px; font-weight: bold; font-family: Arial;">3</text>
    
    <text x="190" y="515" class="step-text" font-size="22" font-weight="bold">Select Your ZIP File</text>
    <text x="190" y="545" class="step-text" font-size="16" fill="#666">Locate and select your ZIP file from</text>
    <text x="190" y="570" class="step-text" font-size="16" fill="#666">your computer</text>
    
    <!-- Connector -->
    <line x1="400" y1="600" x2="400" y2="660" class="connector-line" marker-end="url(#arrowhead)"/>
    
    <!-- SECTION 2: PROCESS -->
    <rect x="60" y="660" width="680" height="60" rx="10" class="section-header"/>
    <text x="400" y="700" text-anchor="middle" style="fill: white; font-size: 24px; font-weight: bold; font-family: Arial;">⚙️ PROCESS</text>
    
    <!-- Step 4 -->
    <rect x="60" y="740" width="680" height="140" rx="15" class="card"/>
    <circle cx="130" cy="810" r="35" fill="url(#badgeGrad)"/>
    <text x="130" y="822" text-anchor="middle" style="fill: white; font-size: 28px; font-weight: bold; font-family: Arial;">4</text>
    
    <text x="190" y="795" class="step-text" font-size="22" font-weight="bold">Run Detection Model</text>
    <text x="190" y="825" class="step-text" font-size="16" fill="#666">Click "Run Detection Model" button</text>
    <text x="190" y="850" class="step-text" font-size="16" fill="#666">to start the analysis pipeline</text>
    
    <!-- Connector -->
    <line x1="400" y1="880" x2="400" y2="920" class="connector-line" marker-end="url(#arrowhead)"/>
    
    <!-- Step 5 -->
    <rect x="60" y="920" width="680" height="340" rx="15" class="card"/>
    <circle cx="130" cy="1000" r="35" fill="url(#badgeGrad)"/>
    <text x="130" y="1012" text-anchor="middle" style="fill: white; font-size: 28px; font-weight: bold; font-family: Arial;">5</text>
    
    <text x="190" y="985" class="step-text" font-size="22" font-weight="bold">Wait for Processing</text>
    <text x="190" y="1015" class="step-text" font-size="16" fill="#666">The analysis pipeline will run through</text>
    <text x="190" y="1040" class="step-text" font-size="16" fill="#666">several stages automatically</text>
    
    <!-- Pipeline stages box -->
    <rect x="100" y="1070" width="600" height="170" rx="10" class="highlight-box"/>
    <text x="400" y="1100" text-anchor="middle" class="step-text" font-size="18" font-weight="bold" fill="#2d7a6e">Analysis Pipeline Stages:</text>
    
    <g transform="translate(130, 1120)">
      <circle cx="0" cy="0" r="5" fill="#2d7a6e"/>
      <text x="20" y="5" class="step-text" font-size="15" fill="#555">Data Loading</text>
    </g>
    
    <g transform="translate(130, 1150)">
      <circle cx="0" cy="0" r="5" fill="#2d7a6e"/>
      <text x="20" y="5" class="step-text" font-size="15" fill="#555">Preprocessing</text>
    </g>
    
    <g transform="translate(130, 1180)">
      <circle cx="0" cy="0" r="5" fill="#2d7a6e"/>
      <text x="20" y="5" class="step-text" font-size="15" fill="#555">Deep Learning Inference</text>
    </g>
    
    <g transform="translate(420, 1120)">
      <circle cx="0" cy="0" r="5" fill="#2d7a6e"/>
      <text x="20" y="5" class="step-text" font-size="15" fill="#555">Post-processing</text>
    </g>
    
    <g transform="translate(420, 1150)">
      <circle cx="0" cy="0" r="5" fill="#2d7a6e"/>
      <text x="20" y="5" class="step-text" font-size="15" fill="#555">Results Generation</text>
    </g>
    
    <!-- Connector -->
    <line x1="400" y1="1260" x2="400" y2="1320" class="connector-line" marker-end="url(#arrowhead)"/>
    
    <!-- SECTION 3: VIEW & SAVE -->
    <rect x="60" y="1320" width="680" height="60" rx="10" class="section-header"/>
    <text x="400" y="1360" text-anchor="middle" style="fill: white; font-size: 24px; font-weight: bold; font-family: Arial;">📊 VIEW & SAVE</text>
    
    <!-- Step 6 -->
    <rect x="60" y="1400" width="680" height="140" rx="15" class="card"/>
    <circle cx="130" cy="1470" r="35" fill="url(#badgeGrad)"/>
    <text x="130" y="1482" text-anchor="middle" style="fill: white; font-size: 28px; font-weight: bold; font-family: Arial;">6</text>
    
    <text x="190" y="1455" class="step-text" font-size="22" font-weight="bold">View 3D Visualization</text>
    <text x="190" y="1485" class="step-text" font-size="16" fill="#666">You'll be automatically redirected to</text>
    <text x="190" y="1510" class="step-text" font-size="16" fill="#666">the 3D Visualization tab</text>
    
    <!-- Connector -->
    <line x1="400" y1="1540" x2="400" y2="1580" class="connector-line" marker-end="url(#arrowhead)"/>
    
    <!-- Step 7 -->
    <rect x="60" y="1580" width="680" height="260" rx="15" class="card"/>
    <circle cx="130" cy="1660" r="35" fill="url(#badgeGrad)"/>
    <text x="130" y="1672" text-anchor="middle" style="fill: white; font-size: 28px; font-weight: bold; font-family: Arial;">7</text>
    
    <text x="190" y="1645" class="step-text" font-size="22" font-weight="bold">Check Results</text>
    <text x="190" y="1675" class="step-text" font-size="16" fill="#666">Go back to Main tab to view all</text>
    <text x="190" y="1700" class="step-text" font-size="16" fill="#666">analysis results and metrics</text>
    
    <!-- Results metrics box -->
    <rect x="100" y="1720" width="600" height="100" rx="8" fill="#f0f8f7" stroke="#2d7a6e" stroke-width="2"/>
    <text x="400" y="1745" text-anchor="middle" class="step-text" font-size="16" fill="#2d7a6e" font-weight="bold">Available Metrics:</text>
    <text x="120" y="1770" class="step-text" font-size="14" fill="#555">• Total Motors Detected</text>
    <text x="120" y="1790" class="step-text" font-size="14" fill="#555">• Avg. Euclidean Distance</text>
    <text x="400" y="1770" class="step-text" font-size="14" fill="#555">• Avg. F Beta Score</text>
    <text x="400" y="1790" class="step-text" font-size="14" fill="#555">• Total Processing Time</text>
    
    <!-- Connector -->
    <line x1="400" y1="1840" x2="400" y2="1880" class="connector-line" marker-end="url(#arrowhead)"/>
    
    <!-- Step 8 -->
    <rect x="60" y="1880" width="680" height="160" rx="15" class="card"/>
    <circle cx="130" cy="1960" r="35" fill="url(#badgeGrad)"/>
    <text x="130" y="1972" text-anchor="middle" style="fill: white; font-size: 28px; font-weight: bold; font-family: Arial;">8</text>
    
    <text x="190" y="1945" class="step-text" font-size="22" font-weight="bold">Save Results</text>
    <text x="190" y="1975" class="step-text" font-size="16" fill="#666">Click "Save Result" button (bottom right)</text>
    <text x="190" y="2000" class="step-text" font-size="16" fill="#666">Results will appear in the History tab</text>
    
    <!-- Tips section -->
    <rect x="60" y="2080" width="680" height="320" rx="15" fill="white" stroke="#2d7a6e" stroke-width="3"/>
    <text x="400" y="2120" text-anchor="middle" style="fill: #2d7a6e; font-size: 24px; font-weight: bold; font-family: Arial;">💡 Quick Tips</text>
    
    <g transform="translate(100, 2160)">
      <circle cx="0" cy="0" r="5" fill="#2d7a6e"/>
      <text x="20" y="5" class="step-text" font-size="15">Ensure your ZIP contains tomogram images only</text>
    </g>
    
    <g transform="translate(100, 2200)">
      <circle cx="0" cy="0" r="5" fill="#2d7a6e"/>
      <text x="20" y="5" class="step-text" font-size="15">Processing time varies by data size</text>
    </g>
    
    <g transform="translate(100, 2240)">
      <circle cx="0" cy="0" r="5" fill="#2d7a6e"/>
      <text x="20" y="5" class="step-text" font-size="15">Access saved results anytime from History tab</text>
    </g>
    
    <g transform="translate(100, 2280)">
      <circle cx="0" cy="0" r="5" fill="#2d7a6e"/>
      <text x="20" y="5" class="step-text" font-size="15">Navigate between tabs to explore different views</text>
    </g>
    
    <g transform="translate(100, 2320)">
      <circle cx="0" cy="0" r="5" fill="#2d7a6e"/>
      <text x="20" y="5" class="step-text" font-size="15">Monitor the pipeline stages for progress updates</text>
    </g>
    
    <g transform="translate(100, 2360)">
      <circle cx="0" cy="0" r="5" fill="#2d7a6e"/>
      <text x="20" y="5" class="step-text" font-size="15">Check all available metrics before saving</text>
    </g>
    
  </g>
  
  <!-- Footer -->
  <rect x="0" y="2540" width="800" height="110" fill="#2d7a6e"/>
  <text x="400" y="2580" text-anchor="middle" style="fill: white; font-size: 22px; font-weight: bold; font-family: Arial;">CRYOMOT</text>
  <text x="400" y="2608" text-anchor="middle" style="fill: rgba(255,255,255,0.95); font-size: 15px; font-family: Arial;">A Deep Learning-Based Detection Of Bacterial Flagellar Motor</text>
  <text x="400" y="2632" text-anchor="middle" style="fill: rgba(255,255,255,0.95); font-size: 15px; font-family: Arial;">in 3D Microscopy Reconstructions</text>
</svg>