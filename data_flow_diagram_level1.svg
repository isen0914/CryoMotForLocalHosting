<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 1800 1200" width="1800" height="1200">
  <defs>
    <!-- Arrow markers for data flows -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#028174"/>
    </marker>
    
    <!-- Shadow filters -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    /* DFD Standard Notation Styles */
    .external-entity { fill: #FFE3B3; stroke: #028174; stroke-width: 2; }
    .process-circle { fill: #92DE8B; stroke: #028174; stroke-width: 2.5; }
    .data-store { fill: #E8F5E9; stroke: #028174; stroke-width: 2; }
    .data-flow { stroke: #028174; stroke-width: 2.5; fill: none; }
    .text-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #000; text-anchor: middle; }
    .text-label { font-family: Arial, sans-serif; font-size: 11px; fill: #028174; text-anchor: middle; font-style: italic; }
    .text-header { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #028174; text-anchor: middle; }
    .text-process { font-family: Arial, sans-serif; font-size: 11px; fill: #000; text-anchor: middle; }
    .text-section { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #028174; }
  </style>
  
  <!-- Title -->
  <text x="900" y="35" class="text-header">CRYOMOT Data Flow Diagram - Level 1</text>
  <text x="900" y="60" style="font-family: Arial; font-size: 13px; fill: #666; text-anchor: middle;">Flagellar Motor Detection System - Sequential Processing Pipeline</text>
  
  <!-- Section Labels -->
  <text x="80" y="110" class="text-section">EXTERNAL</text>
  <text x="900" y="110" class="text-section">MAIN DETECTION PIPELINE</text>
  <text x="900" y="620" class="text-section">SUPPORTING PROCESSES</text>
  
  <!-- External Entity: Researcher -->
  <rect x="50" y="200" width="160" height="90" class="external-entity" filter="url(#shadow)"/>
  <text x="130" y="250" class="text-title">Researcher</text>
  
  <!-- ========== MAIN PIPELINE ========== -->
  
  <!-- Process 1.0: Upload & Extract -->
  <circle cx="320" cy="245" r="65" class="process-circle" filter="url(#shadow)"/>
  <text x="320" y="235" class="text-title">1.0</text>
  <text x="320" y="252" class="text-process">Upload &</text>
  <text x="320" y="265" class="text-process">Extract ZIP</text>
  
  <!-- Process 2.0: Load & Resize -->
  <circle cx="520" cy="245" r="65" class="process-circle" filter="url(#shadow)"/>
  <text x="520" y="235" class="text-title">2.0</text>
  <text x="520" y="252" class="text-process">Load & Resize</text>
  <text x="520" y="265" class="text-process">(250x250)</text>
  
  <!-- Process 3.0: Apply Masking -->
  <circle cx="720" cy="245" r="65" class="process-circle" filter="url(#shadow)"/>
  <text x="720" y="235" class="text-title">3.0</text>
  <text x="720" y="252" class="text-process">Apply Otsu</text>
  <text x="720" y="265" class="text-process">Masking</text>
  
  <!-- Process 4.0: YOLO Detection -->
  <circle cx="920" cy="245" r="65" class="process-circle" filter="url(#shadow)"/>
  <text x="920" y="235" class="text-title">4.0</text>
  <text x="920" y="252" class="text-process">YOLO</text>
  <text x="920" y="265" class="text-process">Detection</text>
  
  <!-- Process 5.0: DBSCAN Clustering -->
  <circle cx="1120" cy="245" r="65" class="process-circle" filter="url(#shadow)"/>
  <text x="1120" y="235" class="text-title">5.0</text>
  <text x="1120" y="252" class="text-process">DBSCAN 3D</text>
  <text x="1120" y="265" class="text-process">Clustering</text>
  
  <!-- Process 6.0: Generate Volumes -->
  <circle cx="1320" cy="245" r="65" class="process-circle" filter="url(#shadow)"/>
  <text x="1320" y="235" class="text-title">6.0</text>
  <text x="1320" y="252" class="text-process">Generate</text>
  <text x="1320" y="265" class="text-process">Volumes</text>
  
  <!-- Process 7.0: Render VTK -->
  <circle cx="1520" cy="245" r="65" class="process-circle" filter="url(#shadow)"/>
  <text x="1520" y="235" class="text-title">7.0</text>
  <text x="1520" y="252" class="text-process">Render</text>
  <text x="1520" y="265" class="text-process">VTK.js</text>
  
  <!-- ========== SUPPORTING PROCESSES ========== -->
  
  <!-- Process 8.0: Manage History -->
  <circle cx="858" cy="700" r="65" class="process-circle" filter="url(#shadow)"/>
  <text x="858" y="690" class="text-title">8.0</text>
  <text x="858" y="707" class="text-process">Manage</text>
  <text x="858" y="720" class="text-process">History</text>
  
  <!-- Process 9.0: Export Results -->
  <circle cx="480" cy="700" r="65" class="process-circle" filter="url(#shadow)"/>
  <text x="480" y="690" class="text-title">9.0</text>
  <text x="480" y="707" class="text-process">Export</text>
  <text x="480" y="720" class="text-process">Results</text>
  
  <!-- ========== DATA STORES ========== -->
  
  <!-- Cloud Storage Area (ALL DATA) -->
  <g>
    <ellipse cx="1450" cy="470" rx="320" ry="270" fill="#E3F2FD" stroke="#1976D2" stroke-width="3" stroke-dasharray="8,4" filter="url(#shadow)"/>
    <text x="1450" y="190" style="font-family: Arial; font-size: 18px; font-weight: bold; fill: #1976D2; text-anchor: middle;">Cloud Storage</text>
    <text x="1450" y="210" style="font-family: Arial; font-size: 12px; fill: #1976D2; text-anchor: middle;">(AWS S3 / Azure Blob / Google Cloud Storage)</text>
    <text x="1450" y="228" style="font-family: Arial; font-size: 10px; font-style: italic; fill: #0D47A1; text-anchor: middle;">Cloud-Native Architecture: All data stores in cloud</text>
    
    <!-- D1: Temp Image Files (in cloud) -->
    <rect x="1150" y="260" width="190" height="45" fill="#FFFFFF" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/>
    <line x1="1150" y1="260" x2="1150" y2="305" stroke="#1976D2" stroke-width="2"/>
    <text x="1245" y="287" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: #000; text-anchor: middle;">D1: Temp Image Files</text>
    
    <!-- D5: YOLO Model (in cloud) -->
    <rect x="1530" y="260" width="180" height="45" fill="#FFFFFF" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/>
    <line x1="1530" y1="260" x2="1530" y2="305" stroke="#1976D2" stroke-width="2"/>
    <text x="1620" y="287" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: #000; text-anchor: middle;">D5: YOLO Model</text>
    
    <!-- D2: Volume Files (in cloud) -->
    <rect x="1350" y="335" width="200" height="45" fill="#FFFFFF" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/>
    <line x1="1350" y1="335" x2="1350" y2="380" stroke="#1976D2" stroke-width="2"/>
    <text x="1450" y="362" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: #000; text-anchor: middle;">D2: Volume Files (.npy)</text>
    
    <!-- D3: Annotated Images (in cloud) -->
    <rect x="1170" y="400" width="200" height="45" fill="#FFFFFF" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/>
    <line x1="1170" y1="400" x2="1170" y2="445" stroke="#1976D2" stroke-width="2"/>
    <text x="1270" y="427" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: #000; text-anchor: middle;">D3: Annotated Images</text>
    
    <!-- D4: History Database (in cloud) -->
    <rect x="1450" y="580" width="200" height="45" fill="#FFFFFF" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/>
    <line x1="1450" y1="580" x2="1450" y2="625" stroke="#1976D2" stroke-width="2"/>
    <text x="1550" y="607" style="font-family: Arial; font-size: 12px; font-weight: bold; fill: #000; text-anchor: middle;">D4: history_data.json</text>
  </g>
  
  <!-- ========== DATA FLOWS ========== -->
  
  <!-- User uploads ZIP -->
  <path d="M 210 245 L 255 245" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="233" y="235" class="text-label">ZIP File</text>
  
  <!-- Main Pipeline Flow (Sequential) -->
  <path d="M 385 245 L 455 245" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="420" y="235" class="text-label">Images</text>
  
  <path d="M 585 245 L 655 245" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="620" y="235" class="text-label">Resized</text>
  
  <path d="M 785 245 L 855 245" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="820" y="235" class="text-label">Masked*</text>
  
  <path d="M 985 245 L 1055 245" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="1020" y="235" class="text-label">Detections</text>
  
  <path d="M 1185 245 L 1255 245" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="1220" y="235" class="text-label">Clusters</text>
  
  <path d="M 1385 245 L 1455 245" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="1420" y="235" class="text-label">Volumes</text>
  
  <!-- YOLO uses ORIGINAL images from D1 (Cloud) -->
  <path d="M 1150 285 L 1000 285 L 1000 260 L 920 260" class="data-flow" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="1070" y="275" class="text-label">Download originals from Cloud*</text>
  
  <!-- D5 Model from Cloud to YOLO -->
  <path d="M 1530 285 L 1400 285 L 1400 220 L 985 220" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="1240" y="210" class="text-label">Load model from Cloud</text>
  
  <!-- Process 1.0 writes to D1 (Cloud) -->
  <path d="M 385 245 L 800 245 L 800 280 L 1150 280" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="650" y="235" class="text-label">Upload extracted to Cloud</text>
  
  <!-- Process 4.0 writes annotated images to D3 (Cloud) -->
  <path d="M 985 245 L 1100 245 L 1100 420 L 1170 420" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="1040" y="330" class="text-label" style="font-size: 10px;">Save to Cloud</text>
  
  <!-- Process 6.0 writes volumes to D2 (Cloud) -->
  <path d="M 1385 245 L 1400 245 L 1400 335" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="1405" y="290" class="text-label">Upload</text>
  
  <!-- Process 7.0 renders and sends to User -->
  <path d="M 1520 180 Q 1200 150 210 200" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="900" y="140" class="text-label">3D Visualization</text>
  
  <!-- Process 8.0: History connections to D4 (Cloud) -->
  <path d="M 923 700 L 1200 700 L 1200 600 L 1450 600" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="1060" y="690" class="text-label">Write to Cloud</text>
  
  <path d="M 1450 605 L 1100 605 L 1100 700 L 923 700" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="1260" y="615" class="text-label">Read from Cloud</text>
  
  <!-- Clustering results to History (Cloud) -->
  <path d="M 1185 245 L 1250 245 L 1250 600 L 1450 600" class="data-flow" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="1250" y="420" class="text-label" style="font-size: 10px;">Metadata</text>
  
  <!-- History to User -->
  <path d="M 793 690 Q 500 470 210 250" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="500" y="480" class="text-label">Records</text>
  
  <!-- Process 9.0: Export connections from D2 (Cloud) -->
  <path d="M 1350 360 L 900 360 L 900 670 L 545 670" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="1120" y="350" class="text-label">Download .npy from Cloud</text>
  
  <!-- Export to User -->
  <path d="M 415 685 Q 310 470 210 290" class="data-flow" marker-end="url(#arrowhead)"/>
  <text x="320" y="490" class="text-label">Download</text>
  
  <!-- Status/Progress feedback arrows -->
  <path d="M 310 185 Q 210 180 210 230" class="data-flow" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
  <text x="250" y="175" class="text-label" style="font-size: 10px;">Status</text>
  
  <path d="M 1100 185 Q 600 170 210 215" class="data-flow" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
  <text x="650" y="165" class="text-label" style="font-size: 10px;">Progress Updates</text>
  
  <!-- Legend -->
  <g transform="translate(1550, 650)">
    <text x="0" y="0" style="font-family: Arial; font-size: 14px; font-weight: bold; fill: #028174;">Legend</text>
    
    <rect x="0" y="15" width="50" height="35" class="external-entity"/>
    <text x="60" y="37" style="font-family: Arial; font-size: 11px; fill: #000;">External Entity</text>
    
    <circle cx="25" cy="75" r="18" class="process-circle"/>
    <text x="60" y="80" style="font-family: Arial; font-size: 11px; fill: #000;">Process</text>
    
    <rect x="0" y="100" width="50" height="25" class="data-store"/>
    <line x1="0" y1="100" x2="0" y2="125" stroke="#028174" stroke-width="2"/>
    <text x="60" y="117" style="font-family: Arial; font-size: 11px; fill: #000;">Data Store</text>
    
    <path d="M 0 145 L 50 145" class="data-flow" marker-end="url(#arrowhead)"/>
    <text x="60" y="150" style="font-family: Arial; font-size: 11px; fill: #000;">Data Flow</text>
    
    <path d="M 0 170 L 50 170" class="data-flow" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
    <text x="60" y="175" style="font-family: Arial; font-size: 11px; fill: #000;">Async Flow</text>
    
    <path d="M 0 195 L 50 195" class="data-flow" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
    <text x="60" y="200" style="font-family: Arial; font-size: 11px; fill: #000;">Status/Feedback</text>
    
    <ellipse cx="25" cy="225" rx="20" ry="12" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="60" y="230" style="font-family: Arial; font-size: 11px; fill: #000;">Cloud Storage</text>
  </g>
  
  <!-- Notes Section -->
  <g transform="translate(50, 980)">
    <text x="0" y="0" style="font-family: Arial; font-size: 13px; font-weight: bold; fill: #028174;">System Notes:</text>
    <text x="0" y="22" style="font-family: Arial; font-size: 10px; fill: #555;">• *CRITICAL: YOLO Detection (4.0) runs on ORIGINAL images from D1, NOT masked volumes. Masking (3.0) creates visualization volume only.</text>
    <text x="0" y="38" style="font-family: Arial; font-size: 10px; fill: #555;">• Sequential Pipeline: Upload → Extract → Resize (250x250) → [Branch: Mask for viz | YOLO on originals] → Cluster → Generate → Render</text>
    <text x="0" y="54" style="font-family: Arial; font-size: 10px; fill: #555;">• DBSCAN Parameters: eps=50, min_samples=3, min_cluster_size=3, min_distance=100</text>
    <text x="0" y="70" style="font-family: Arial; font-size: 10px; fill: #555;">• Otsu Masking: threshold_multiplier=0.78 for background removal in visualization volumes</text>
    <text x="0" y="86" style="font-family: Arial; font-size: 10px; fill: #555;">• Backend: FastAPI/Uvicorn on port 8000 with streaming JSON responses for real-time progress</text>
    <text x="0" y="102" style="font-family: Arial; font-size: 10px; fill: #555;">• Frontend: Vanilla JavaScript with VTK.js for interactive 3D volume rendering (no React/Node.js)</text>
    <text x="0" y="118" style="font-family: Arial; font-size: 10px; fill: #555;">• Storage Architecture: CLOUD-NATIVE - ALL data stores (D1, D2, D3, D4, D5) in cloud storage. Backend processes run in cloud (AWS Lambda/EC2, Cloud Run, Azure Functions).</text>
    <text x="0" y="134" style="font-family: Arial; font-size: 10px; fill: #555;">• Cloud Benefits: Infinite scalability, automatic backup, multi-user concurrent access, integrated ML pipelines, pay-per-use, global availability, disaster recovery</text>
    <text x="0" y="150" style="font-family: Arial; font-size: 10px; fill: #555;">• Deployment: Backend containers in cloud compute same region as storage for low latency. Only frontend (VTK.js) runs in user's browser.</text>
  </g>
  
  <!-- Process Details -->
  <g transform="translate(900, 980)">
    <text x="0" y="0" style="font-family: Arial; font-size: 13px; font-weight: bold; fill: #028174;">Process Descriptions:</text>
    <text x="0" y="22" style="font-family: Arial; font-size: 10px; fill: #555;">1.0: Extract ZIP to temporary directory (zipfile.extractall)</text>
    <text x="0" y="38" style="font-family: Arial; font-size: 10px; fill: #555;">2.0: Load images and resize to 250x250 pixels (skimage.transform.resize)</text>
    <text x="0" y="54" style="font-family: Arial; font-size: 10px; fill: #555;">3.0: Apply Otsu thresholding for background removal (visualization only)</text>
    <text x="0" y="70" style="font-family: Arial; font-size: 10px; fill: #555;">4.0: Run YOLO inference on ORIGINAL images, generate annotated outputs</text>
    <text x="0" y="86" style="font-family: Arial; font-size: 10px; fill: #555;">5.0: Organize detections by tomogram, apply DBSCAN 3D clustering</text>
    <text x="0" y="102" style="font-family: Arial; font-size: 10px; fill: #555;">6.0: Generate three volume types (processed, transparent, combined)</text>
    <text x="0" y="118" style="font-family: Arial; font-size: 10px; fill: #555;">7.0: Render interactive 3D visualization using VTK.js in browser</text>
    <text x="0" y="134" style="font-family: Arial; font-size: 10px; fill: #555;">8.0: Manage detection history (CRUD operations on history_data.json)</text>
    <text x="0" y="150" style="font-family: Arial; font-size: 10px; fill: #555;">9.0: Export volume files for external analysis tools</text>
  </g>
  
</svg>
