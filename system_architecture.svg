<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Kiwi Color Palette -->
    <style>
      .kiwi-dark { fill: #00796B; }
      .kiwi-medium { fill: #26A69A; }
      .kiwi-light { fill: #80CBC4; }
      .kiwi-pale { fill: #FFEAA7; }
      .border { stroke: #455A64; stroke-width: 2; }
      .dashed { stroke-dasharray: 5,5; }
      .text-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #263238; }
      .text-subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #37474F; }
      .text-small { font-family: Arial, sans-serif; font-size: 12px; fill: #455A64; }
      .text-white { fill: white; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .text-white-small { fill: white; font-family: Arial, sans-serif; font-size: 11px; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#F5F5F5"/>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="text-title" font-size="22">YOLO 3D VOLUME PROCESSING SYSTEM</text>
  
  <!-- Main Container -->
  <rect x="50" y="60" width="1100" height="700" fill="white" class="border" rx="10"/>
  
  <!-- Client Layer -->
  <rect x="80" y="90" width="180" height="200" fill="#E8F5E9" class="border dashed" rx="5"/>
  <text x="170" y="110" text-anchor="middle" class="text-title" font-size="14">CLIENT LAYER</text>
  
  <!-- Browser -->
  <circle cx="170" cy="160" r="35" class="kiwi-pale"/>
  <text x="170" y="165" text-anchor="middle" class="text-white-small">🖥️</text>
  <text x="170" y="210" text-anchor="middle" class="text-subtitle">Web Browser</text>
  <text x="170" y="225" text-anchor="middle" class="text-small">HTML5/CSS3/JS</text>
  
  <!-- Arrow to Frontend -->
  <path d="M 260 160 L 330 160" stroke="#00796B" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="295" y="150" text-anchor="middle" class="text-small">HTTP</text>
  
  <!-- Frontend Services -->
  <rect x="330" y="90" width="300" height="280" fill="#E3F2FD" class="border dashed" rx="5"/>
  <text x="480" y="110" text-anchor="middle" class="text-title" font-size="14">FRONTEND SERVICES</text>
  
  <!-- Static Files -->
  <rect x="350" y="130" width="120" height="60" class="kiwi-medium" rx="5"/>
  <text x="410" y="155" text-anchor="middle" class="text-white">Static Files</text>
  <text x="410" y="175" text-anchor="middle" class="text-white-small">index.html</text>
  
  <!-- UI Components -->
  <rect x="490" y="130" width="120" height="60" class="kiwi-medium" rx="5"/>
  <text x="550" y="150" text-anchor="middle" class="text-white">UI Components</text>
  <text x="550" y="165" text-anchor="middle" class="text-white-small">Upload</text>
  <text x="550" y="180" text-anchor="middle" class="text-white-small">Navigation</text>
  
  <!-- VTK.js Renderer -->
  <rect x="350" y="210" width="120" height="60" class="kiwi-dark" rx="5"/>
  <text x="410" y="235" text-anchor="middle" class="text-white">VTK.js</text>
  <text x="410" y="255" text-anchor="middle" class="text-white-small">3D Renderer</text>
  
  <!-- Real-time Updates -->
  <rect x="490" y="210" width="120" height="60" class="kiwi-dark" rx="5"/>
  <text x="550" y="230" text-anchor="middle" class="text-white">Real-time</text>
  <text x="550" y="245" text-anchor="middle" class="text-white-small">History</text>
  <text x="550" y="260" text-anchor="middle" class="text-white-small">Auto-refresh</text>
  
  <!-- Frontend Features -->
  <rect x="350" y="290" width="260" height="65" fill="#B2DFDB" class="border" rx="5"/>
  <text x="480" y="310" text-anchor="middle" class="text-small">Features:</text>
  <text x="365" y="325" class="text-small">• ZIP Upload & Processing</text>
  <text x="365" y="340" class="text-small">• 3D Volume Visualization</text>
  
  <!-- Arrow to Backend -->
  <path d="M 630 220 L 700 220" stroke="#00796B" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="665" y="210" text-anchor="middle" class="text-small">REST API</text>
  <text x="665" y="240" text-anchor="middle" class="text-small">CORS Enabled</text>
  
  <!-- Backend Services -->
  <rect x="700" y="90" width="420" height="510" fill="#FFF3E0" class="border dashed" rx="5"/>
  <text x="910" y="110" text-anchor="middle" class="text-title" font-size="14">BACKEND SERVICES</text>
  
  <!-- FastAPI Server -->
  <rect x="720" y="130" width="180" height="70" class="kiwi-pale" rx="5"/>
  <text x="810" y="155" text-anchor="middle" class="text-title">FastAPI Server</text>
  <text x="810" y="175" text-anchor="middle" class="text-small">Port: 8000</text>
  <text x="810" y="190" text-anchor="middle" class="text-small">Uvicorn ASGI</text>
  
  <!-- API Endpoints -->
  <rect x="920" y="130" width="180" height="70" class="kiwi-pale" rx="5"/>
  <text x="1010" y="150" text-anchor="middle" class="text-title">API Endpoints</text>
  <text x="1010" y="165" text-anchor="middle" class="text-small">/detect (POST)</text>
  <text x="1010" y="180" text-anchor="middle" class="text-small">/history (GET)</text>
  <text x="1010" y="195" text-anchor="middle" class="text-small">/outputs/* (Static)</text>
  
  <!-- ML Processing Pipeline -->
  <rect x="720" y="220" width="380" height="150" fill="#C8E6C9" class="border" rx="5"/>
  <text x="910" y="240" text-anchor="middle" class="text-title">ML PROCESSING PIPELINE</text>
  
  <!-- YOLO Model -->
  <rect x="740" y="255" width="160" height="100" class="kiwi-dark" rx="5"/>
  <text x="820" y="280" text-anchor="middle" class="text-white">YOLO Model</text>
  <text x="820" y="300" text-anchor="middle" class="text-white-small">best.pt / best.quant.onnx</text>
  <text x="820" y="320" text-anchor="middle" class="text-white-small">Object Detection</text>
  <text x="820" y="335" text-anchor="middle" class="text-white-small">Slice-by-slice</text>
  
  <!-- Processing Steps -->
  <rect x="920" y="255" width="160" height="100" class="kiwi-medium" rx="5"/>
  <text x="1000" y="275" text-anchor="middle" class="text-white">Processing</text>
  <text x="1000" y="292" text-anchor="middle" class="text-white-small">1. ZIP Extraction</text>
  <text x="1000" y="307" text-anchor="middle" class="text-white-small">2. Image Detection</text>
  <text x="1000" y="322" text-anchor="middle" class="text-white-small">3. DBSCAN Clustering</text>
  <text x="1000" y="337" text-anchor="middle" class="text-white-small">4. 3D Reconstruction</text>
  
  <!-- Data Processing -->
  <rect x="720" y="390" width="180" height="90" class="kiwi-light" rx="5"/>
  <text x="810" y="415" text-anchor="middle" class="text-white">Volume Generation</text>
  <text x="810" y="435" text-anchor="middle" class="text-white-small">NumPy Arrays</text>
  <text x="810" y="450" text-anchor="middle" class="text-white-small">Binary Masking</text>
  <text x="810" y="465" text-anchor="middle" class="text-white-small">Transparent Volume</text>
  
  <!-- Output Management -->
  <rect x="920" y="390" width="180" height="90" class="kiwi-light" rx="5"/>
  <text x="1010" y="415" text-anchor="middle" class="text-white">Output Management</text>
  <text x="1010" y="435" text-anchor="middle" class="text-white-small">File Storage</text>
  <text x="1010" y="450" text-anchor="middle" class="text-white-small">History Tracking</text>
  <text x="1010" y="465" text-anchor="middle" class="text-white-small">JSON Response</text>
  
  <!-- Technology Stack -->
  <rect x="720" y="500" width="380" height="85" fill="#FFE0B2" class="border" rx="5"/>
  <text x="910" y="520" text-anchor="middle" class="text-title">TECHNOLOGY STACK</text>
  <text x="750" y="540" class="text-small">• Python 3.x</text>
  <text x="750" y="555" class="text-small">• Ultralytics YOLO</text>
  <text x="750" y="570" class="text-small">• scikit-learn (DBSCAN)</text>
  <text x="920" y="540" class="text-small">• NumPy</text>
  <text x="920" y="555" class="text-small">• scikit-image</text>
  <text x="920" y="570" class="text-small">• PIL/Pillow</text>
  
  <!-- Storage Layer -->
  <rect x="80" y="400" width="550" height="240" fill="#F3E5F5" class="border dashed" rx="5"/>
  <text x="355" y="420" text-anchor="middle" class="text-title" font-size="14">STORAGE & DEPLOYMENT</text>
  
  <!-- File Storage -->
  <rect x="100" y="440" width="150" height="80" class="kiwi-dark" rx="5"/>
  <text x="175" y="465" text-anchor="middle" class="text-white">File System</text>
  <text x="175" y="485" text-anchor="middle" class="text-white-small">outputs/</text>
  <text x="175" y="500" text-anchor="middle" class="text-white-small">*.npy volumes</text>
  <text x="175" y="515" text-anchor="middle" class="text-white-small">history_data.json</text>
  
  <!-- Model Storage -->
  <rect x="270" y="440" width="150" height="80" class="kiwi-medium" rx="5"/>
  <text x="345" y="465" text-anchor="middle" class="text-white">Model Files</text>
  <text x="345" y="485" text-anchor="middle" class="text-white-small">best.pt (PyTorch)</text>
  <text x="345" y="500" text-anchor="middle" class="text-white-small">best.quant.onnx</text>
  <text x="345" y="515" text-anchor="middle" class="text-white-small">(Quantized)</text>
  
  <!-- Docker -->
  <rect x="440" y="440" width="170" height="80" class="kiwi-light" rx="5"/>
  <text x="525" y="465" text-anchor="middle" class="text-white">🐳 Docker</text>
  <text x="525" y="485" text-anchor="middle" class="text-white-small">Containerized</text>
  <text x="525" y="500" text-anchor="middle" class="text-white-small">Backend Deployment</text>
  <text x="525" y="515" text-anchor="middle" class="text-white-small">Dockerfile + Scripts</text>
  
  <!-- Performance -->
  <rect x="100" y="540" width="250" height="85" fill="#B2DFDB" class="border" rx="5"/>
  <text x="225" y="560" text-anchor="middle" class="text-small">Performance Features:</text>
  <text x="115" y="580" class="text-small">• Model Quantization (ONNX)</text>
  <text x="115" y="595" class="text-small">• Optimized Inference</text>
  <text x="115" y="610" class="text-small">• Efficient Memory Management</text>
  
  <!-- Deployment -->
  <rect x="370" y="540" width="240" height="85" fill="#FFE0B2" class="border" rx="5"/>
  <text x="490" y="560" text-anchor="middle" class="text-small">Deployment Options:</text>
  <text x="385" y="580" class="text-small">• Local Development (Uvicorn)</text>
  <text x="385" y="595" class="text-small">• Docker Container</text>
  <text x="385" y="610" class="text-small">• PowerShell Scripts</text>
  
  <!-- Data Flow Arrows -->
  <!-- Client to Storage -->
  <path d="M 170 260 L 170 440" stroke="#00796B" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="185" y="350" class="text-small">Upload</text>
  
  <!-- Backend to Storage -->
  <path d="M 810 600 L 810 580 L 350 580 L 350 520" stroke="#00796B" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="500" y="595" class="text-small">Save/Load</text>
  
  <!-- Backend to Model -->
  <path d="M 810 200 L 810 255" stroke="#26A69A" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="825" y="230" class="text-small">Inference</text>
  
  <!-- Legend -->
  <rect x="670" y="660" width="450" height="85" fill="white" class="border" rx="5"/>
  <text x="895" y="680" text-anchor="middle" class="text-title">SYSTEM CAPABILITIES</text>
  <text x="690" y="700" class="text-small">✓ ZIP file upload with multi-slice images</text>
  <text x="690" y="715" class="text-small">✓ YOLO-based object detection on each slice</text>
  <text x="690" y="730" class="text-small">✓ 3D volume reconstruction with clustering</text>
  <text x="900" y="700" class="text-small">✓ Real-time VTK.js visualization</text>
  <text x="900" y="715" class="text-small">✓ Transparent volume generation</text>
  <text x="900" y="730" class="text-small">✓ Processing history tracking</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00796B" />
    </marker>
  </defs>
</svg>
