<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1400" height="900" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <defs>
    <style>
      .kiwi-dark { fill: #00796B; }
      .kiwi-medium { fill: #26A69A; }
      .kiwi-light { fill: #80CBC4; }
      .kiwi-pale { fill: #FFEAA7; }
      .border { stroke: #455A64; stroke-width: 2; }
      .border-thick { stroke: #455A64; stroke-width: 3; }
      .dashed { stroke-dasharray: 5,5; }
      .text-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #263238; }
      .text-subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #37474F; }
      .text-small { font-family: Arial, sans-serif; font-size: 12px; fill: #455A64; }
      .text-white { fill: white; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .text-white-small { fill: white; font-family: Arial, sans-serif; font-size: 11px; }
    </style>
    
    <linearGradient id="kiwigradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#26A69A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00796B;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA000;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00796B" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="900" fill="#F5F5F5"/>
  
  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" class="text-title" font-size="24">CRYOMOT</text>
  <text x="700" y="60" text-anchor="middle" class="text-small" font-size="13">A Deep Learning-Based Detection Of Bacterial Flagellar Motor
in 3D Microscopy Reconstructions</text>
  
  <!-- Main Container -->
  <rect x="50" y="90" width="1300" height="780" fill="white" class="border-thick" rx="15" filter="url(#shadow)"/>
  
  <!-- Client Layer -->
  <rect x="80" y="120" width="200" height="280" fill="#E8F5E9" class="border dashed" rx="8"/>
  <text x="180" y="145" text-anchor="middle" class="text-title" font-size="15">CLIENT LAYER</text>
  
  <!-- Browser -->
  <circle cx="180" cy="205" r="40" fill="#FFEAA7" filter="url(#shadow)"/>
  <text x="180" y="215" text-anchor="middle" font-size="28">🖥️</text>
  <text x="180" y="260" text-anchor="middle" class="text-subtitle" font-weight="bold">BROWSER</text>
  <text x="180" y="275" text-anchor="middle" class="text-small">HTML5/CSS3/JS</text>
  
  <!-- Mobile -->
  <circle cx="180" cy="330" r="40" fill="#FFEAA7" filter="url(#shadow)"/>
  <text x="180" y="340" text-anchor="middle" font-size="28">📱</text>
  <text x="180" y="385" text-anchor="middle" class="text-subtitle" font-weight="bold">MOBILE</text>
  
  <!-- Arrow from clients to frontend -->
  <path d="M 280 260 L 340 260" stroke="#00796B" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="310" y="250" text-anchor="middle" class="text-small" font-weight="bold">HTTPS</text>
  
  <!-- Frontend Services Container -->
  <rect x="340" y="120" width="380" height="430" fill="#E3F2FD" class="border dashed" rx="10"/>
  <text x="530" y="145" text-anchor="middle" class="text-title" font-size="15">FRONTEND SERVICES</text>
  
  <!-- Web Service -->
  <rect x="360" y="165" width="160" height="100" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="440" cy="200" r="22" fill="#FFEAA7" stroke="#FFA000" stroke-width="2"/>
  <text x="440" y="205" text-anchor="middle" font-size="18">🌐</text>
  <text x="440" y="233" text-anchor="middle" class="text-subtitle" font-weight="bold">Web Interface</text>
  <rect x="370" y="240" width="140" height="20" fill="#C8E6C9" rx="3"/>
  <text x="440" y="254" text-anchor="middle" class="text-small">VTK.js</text>
  
  <!-- Static Assets -->
  <rect x="540" y="165" width="160" height="100" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="620" cy="200" r="22" fill="#FFEAA7" stroke="#FFA000" stroke-width="2"/>
  <text x="620" y="206" text-anchor="middle" font-size="18">📄</text>
  <text x="620" y="233" text-anchor="middle" class="text-subtitle" font-weight="bold">Static Assets</text>
  <rect x="550" y="240" width="140" height="20" fill="#C8E6C9" rx="3"/>
  <text x="620" y="254" text-anchor="middle" class="text-small">HTML/CSS/JS</text>
  
  <!-- UI Components -->
  <rect x="360" y="285" width="160" height="125" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="440" cy="320" r="22" fill="#FFEAA7" stroke="#FFA000" stroke-width="2"/>
  <text x="440" y="326" text-anchor="middle" font-size="18">🎨</text>
  <text x="440" y="353" text-anchor="middle" class="text-subtitle" font-weight="bold">UI Components</text>
  <text x="380" y="375" class="text-small">• File Upload</text>
  <text x="380" y="390" class="text-small">• 3D Volume Viewer</text>
  <text x="380" y="405" class="text-small">• Navigation</text>
  
  <!-- App Lifecycle -->
  <rect x="540" y="285" width="160" height="125" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="620" cy="320" r="22" fill="#FFEAA7" stroke="#FFA000" stroke-width="2"/>
  <text x="620" y="326" text-anchor="middle" fill="white" font-size="18">🔄</text>
  <text x="620" y="353" text-anchor="middle" class="text-subtitle" font-weight="bold">App Lifecycle</text>
  <text x="560" y="375" class="text-small">• State Management</text>
  <text x="560" y="390" class="text-small">• Auto-refresh</text>
  <text x="560" y="405" class="text-small">• Real-time Updates</text>
  
  <!-- Features Box -->
  <rect x="360" y="430" width="340" height="105" fill="#B2DFDB" class="border" rx="5"/>
  <text x="530" y="453" text-anchor="middle" class="text-subtitle" font-weight="bold">Frontend Features:</text>
  <text x="375" y="475" class="text-small">✓ ZIP file upload and multi-slice processing</text>
  <text x="375" y="493" class="text-small">✓ Interactive 3D volume visualization</text>
  <text x="375" y="511" class="text-small">✓ Real-time processing history</text>
  
  <!-- Arrow Frontend to Backend -->
  <path d="M 720 310 L 800 310" stroke="#00796B" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="760" y="300" text-anchor="middle" class="text-small" font-weight="bold">REST API</text>
  <text x="760" y="328" text-anchor="middle" class="text-small">CORS Enabled</text>
  
  <!-- Backend Services Container -->
  <rect x="800" y="120" width="520" height="550" fill="#FFF3E0" class="border dashed" rx="10"/>
  <text x="1060" y="145" text-anchor="middle" class="text-title" font-size="15">BACKEND SERVICES</text>
  
  <!-- API Gateway (FastAPI) -->
  <rect x="820" y="165" width="190" height="100" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="915" cy="200" r="22" fill="#FFEAA7" stroke="#FFA000" stroke-width="2"/>
  <text x="915" y="208" text-anchor="middle" font-size="18">📦</text>
  <text x="915" y="233" text-anchor="middle" class="text-subtitle" font-weight="bold">API Gateway</text>
  <rect x="835" y="240" width="160" height="20" fill="#FFE0B2" rx="3"/>
  <text x="915" y="254" text-anchor="middle" class="text-small">FastAPI Server :8000</text>
  
  <!-- API Endpoints -->
  <rect x="1030" y="165" width="270" height="100" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="1080" cy="200" r="22" fill="#FFEAA7" stroke="#FFA000" stroke-width="2"/>
  <text x="1080" y="208" text-anchor="middle" font-size="18">🔌</text>
  <text x="1195" y="193" text-anchor="middle" class="text-subtitle" font-weight="bold">API Endpoints</text>
  <text x="1100" y="220" class="text-small">• /detect (POST) - Upload & Process</text>
  <text x="1100" y="237" class="text-small">• /history (GET) - Fetch History</text>
  <text x="1100" y="254" class="text-small">• /outputs/* (Static Files)</text>
  
  <!-- ML Processing Pipeline -->
  <rect x="820" y="285" width="480" height="170" fill="#C8E6C9" class="border" rx="8"/>
  <text x="1060" y="308" text-anchor="middle" class="text-title" font-size="14">ML PROCESSING PIPELINE</text>
  
  <!-- YOLO Detection -->
  <rect x="840" y="325" width="140" height="115" fill="url(#kiwigradient)" rx="5" filter="url(#shadow)"/>
  <text x="910" y="348" text-anchor="middle" class="text-white" font-size="13" font-weight="bold">YOLO Model</text>
  <text x="910" y="368" text-anchor="middle" class="text-white-small">best.pt</text>
  <text x="910" y="383" text-anchor="middle" class="text-white-small">best.quant.onnx</text>
  <line x1="855" y1="393" x2="965" y2="393" stroke="white" stroke-width="1"/>
  <text x="910" y="410" text-anchor="middle" class="text-white-small">Object Detection</text>
  <text x="910" y="425" text-anchor="middle" class="text-white-small">Slice-by-slice Analysis</text>
  
  <!-- DBSCAN Clustering -->
  <rect x="990" y="325" width="140" height="115" fill="url(#kiwigradient)" rx="5" filter="url(#shadow)"/>
  <text x="1060" y="348" text-anchor="middle" class="text-white" font-size="13" font-weight="bold">DBSCAN</text>
  <text x="1060" y="368" text-anchor="middle" class="text-white-small">Clustering Engine</text>
  <line x1="1005" y1="378" x2="1125" y2="378" stroke="white" stroke-width="1"/>
  <text x="1060" y="395" text-anchor="middle" class="text-white-small">3D Grouping</text>
  <text x="1060" y="410" text-anchor="middle" class="text-white-small">Spatial Analysis</text>
  <text x="1060" y="425" text-anchor="middle" class="text-white-small">scikit-learn</text>
  
  <!-- Volume Reconstruction -->
  <rect x="1140" y="325" width="140" height="115" fill="url(#kiwigradient)" rx="5" filter="url(#shadow)"/>
  <text x="1210" y="348" text-anchor="middle" class="text-white" font-size="13" font-weight="bold">Volume</text>
  <text x="1210" y="365" text-anchor="middle" class="text-white" font-size="13" font-weight="bold">Generator</text>
  <line x1="1150" y1="375" x2="1270" y2="375" stroke="white" stroke-width="1"/>
  <text x="1210" y="392" text-anchor="middle" class="text-white-small">NumPy Arrays</text>
  <text x="1210" y="407" text-anchor="middle" class="text-white-small">Binary Masking</text>
  <text x="1210" y="422" text-anchor="middle" class="text-white-small">Transparency</text>
  
  <!-- Processing Steps -->
  <rect x="820" y="475" width="480" height="80" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <text x="1060" y="495" text-anchor="middle" class="text-subtitle" font-weight="bold">Processing Steps:</text>
  <text x="850" y="517" class="text-small">1️⃣ ZIP Extraction</text>
  <text x="850" y="535" class="text-small">2️⃣ Image Detection (YOLO)</text>
  <text x="1070" y="517" class="text-small">3️⃣ DBSCAN Clustering</text>
  <text x="1070" y="535" class="text-small">4️⃣ 3D Volume Reconstruction</text>
  
  <!-- Output Management -->
  <rect x="820" y="575" width="230" height="80" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="865" cy="610" r="20" fill="#FFEAA7" stroke="#FFA000" stroke-width="2"/>
  <text x="865" y="618" text-anchor="middle" font-size="16">💾</text>
  <text x="960" y="603" text-anchor="middle" class="text-subtitle" font-weight="bold">File Storage</text>
  <text x="960" y="623" text-anchor="middle" class="text-small">outputs/*.npy</text>
  <text x="960" y="638" text-anchor="middle" class="text-small">Persistent Storage</text>
  
  <!-- History Tracker -->
  <rect x="1070" y="575" width="230" height="80" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="1115" cy="610" r="20" fill="#FFEAA7" stroke="#FFA000" stroke-width="2"/>
  <text x="1115" y="618" text-anchor="middle" font-size="16">📊</text>
  <text x="1210" y="603" text-anchor="middle" class="text-subtitle" font-weight="bold">History Service</text>
  <text x="1210" y="623" text-anchor="middle" class="text-small">history_data.json</text>
  <text x="1210" y="638" text-anchor="middle" class="text-small">Metadata Tracking</text>
  
  <!-- Storage & Deployment Layer -->
  <rect x="80" y="690" width="1240" height="160" fill="#F3E5F5" class="border dashed" rx="10"/>
  <text x="700" y="715" text-anchor="middle" class="text-title" font-size="15">STORAGE &amp; DEPLOYMENT</text>
  
  <!-- File System -->
  <rect x="100" y="735" width="150" height="95" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="175" cy="770" r="22" fill="#455A64" stroke="#263238" stroke-width="2"/>
  <text x="175" y="778" text-anchor="middle" fill="white" font-size="18">💿</text>
  <text x="175" y="805" text-anchor="middle" class="text-subtitle" font-weight="bold">File System</text>
  <text x="175" y="818" text-anchor="middle" class="text-small">outputs/</text>
  
  <!-- Model Storage -->
  <rect x="270" y="735" width="150" height="95" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="345" cy="770" r="22" fill="#455A64" stroke="#263238" stroke-width="2"/>
  <text x="345" y="778" text-anchor="middle" fill="white" font-size="18">🧠</text>
  <text x="345" y="805" text-anchor="middle" class="text-subtitle" font-weight="bold">Model Files</text>
  <text x="345" y="818" text-anchor="middle" class="text-small">.pt / .onnx</text>
  
  <!-- Volume Cache -->
  <rect x="440" y="735" width="150" height="95" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="515" cy="770" r="22" fill="#455A64" stroke="#263238" stroke-width="2"/>
  <text x="515" y="778" text-anchor="middle" fill="white" font-size="18">📦</text>
  <text x="515" y="805" text-anchor="middle" class="text-subtitle" font-weight="bold">Volume Cache</text>
  <text x="515" y="818" text-anchor="middle" class="text-small">NPY Arrays</text>
  
  <!-- History DB -->
  <rect x="610" y="735" width="150" height="95" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="685" cy="770" r="22" fill="#455A64" stroke="#263238" stroke-width="2"/>
  <text x="685" y="778" text-anchor="middle" fill="white" font-size="18">📋</text>
  <text x="685" y="805" text-anchor="middle" class="text-subtitle" font-weight="bold">History DB</text>
  <text x="685" y="818" text-anchor="middle" class="text-small">JSON Store</text>
  
  <!-- Docker Container -->
  <rect x="780" y="735" width="190" height="95" fill="#2496ED" rx="5" filter="url(#shadow)"/>
  <text x="875" y="770" text-anchor="middle" fill="white" font-size="24">🐳</text>
  <text x="875" y="795" text-anchor="middle" fill="white" font-weight="bold" font-size="15">Docker</text>
  <text x="875" y="813" text-anchor="middle" fill="white" font-size="11">Containerized Deployment</text>
  
  <!-- Technology Stack -->
  <rect x="990" y="735" width="310" height="95" fill="#FFE0B2" class="border" rx="5" filter="url(#shadow)"/>
  <text x="1145" y="755" text-anchor="middle" class="text-subtitle" font-weight="bold">Technology Stack:</text>
  <text x="1010" y="777" class="text-small">• Python 3.x</text>
  <text x="1010" y="793" class="text-small">• Ultralytics YOLO</text>
  <text x="1010" y="809" class="text-small">• NumPy/scikit-learn</text>
  <text x="1160" y="777" class="text-small">• FastAPI/Uvicorn</text>
  <text x="1160" y="793" class="text-small">• VTK.js</text>
  <text x="1160" y="809" class="text-small">• PIL/Pillow</text>
  
  <!-- Connection arrows Backend to Storage -->
  <path d="M 915 655 L 915 680 L 175 680 L 175 735" stroke="#00796B" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 935 655 L 935 680 L 345 680 L 345 735" stroke="#00796B" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 1185 655 L 1185 680 L 515 680 L 515 735" stroke="#00796B" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path x="M 1185 640 L 1185 680 L 685 680 L 685 735" stroke="#00796B" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
</svg>