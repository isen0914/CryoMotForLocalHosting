<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1400" height="950" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950">
  <defs>
    <style>
      .kiwi-dark { fill: #028174; }
      .kiwi-medium { fill: #0AB68B; }
      .kiwi-light { fill: #92DE8B; }
      .kiwi-pale { fill: #FFE3B3; }
      .cloud-bg { fill: #E8F5E9; }
      .border { stroke: #455A64; stroke-width: 2; }
      .border-thick { stroke: #455A64; stroke-width: 3; }
      .dashed { stroke-dasharray: 5,5; }
      .dashed-thick { stroke-dasharray: 8,4; }
      .text-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #263238; }
      .text-subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #37474F; }
      .text-small { font-family: Arial, sans-serif; font-size: 12px; fill: #455A64; }
      .text-white { fill: white; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .text-white-small { fill: white; font-family: Arial, sans-serif; font-size: 11px; }
    </style>
    
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92DE8B;stop-opacity:0.3" />
    </linearGradient>
    
    <linearGradient id="kiwigradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0AB68B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#028174;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE3B3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC570;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow-strong">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#028174" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="950" fill="#F5F5F5"/>
  
  <!-- Title -->
  <text x="700" y="35" text-anchor="middle" class="text-title" font-size="24">CRYOMOT</text>
  <text x="700" y="55" text-anchor="middle" class="text-small" font-size="13">A Deep Learning-Based Detection Of Bacterial Flagellar Motor in 3D Microscopy Reconstructions</text>
  
  <!-- Cloud Network Container -->
  <rect x="40" y="80" width="1320" height="840" fill="WHITE" class="border-thick" rx="15" filter="url(#shadow-strong)"/>
  <text x="60" y="105" class="text-title" font-size="18" font-weight="bold">☁️ CLOUD NETWORK</text>
  
  <!-- Main Container -->
  <rect x="70" y="130" width="1260" height="770" fill="white" class="border-thick" rx="15" filter="url(#shadow-strong)"/>
  
  <!-- Client Layer -->
  <rect x="100" y="160" width="200" height="280" fill="#E8F5E9" class="border dashed" rx="8" filter="url(#shadow-strong)"/>
  <text x="200" y="185" text-anchor="middle" class="text-title" font-size="15">CLIENT LAYER</text>
  
  <!-- Browser -->
  <circle cx="200" cy="235" r="40" fill="#FFE3B3" filter="url(#shadow)"/>
  <text x="200" y="243" text-anchor="middle" font-size="28">🖥️</text>
  <text x="200" y="290" text-anchor="middle" class="text-subtitle" font-weight="bold">BROWSER</text>
  <text x="200" y="308" text-anchor="middle" class="text-small">HTML5/CSS3/JS</text>
  
  <!-- Mobile -->
  <circle cx="200" cy="360" r="40" fill="#FFE3B3" filter="url(#shadow)"/>
  <text x="200" y="370" text-anchor="middle" font-size="28">📱</text>
  <text x="200" y="418" text-anchor="middle" class="text-subtitle" font-weight="bold">MOBILE</text>
  
  <!-- Arrow from clients to frontend -->
  <path d="M 300 300 L 360 300" stroke="#028174" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="330" y="290" text-anchor="middle" class="text-small" font-weight="bold">HTTPS</text>
  
  <!-- Frontend Services Container -->
  <rect x="360" y="160" width="380" height="430" fill="#E8F5E9" class="border dashed" rx="8" filter="url(#shadow-strong)"/>
  <text x="550" y="185" text-anchor="middle" class="text-title" font-size="15">FRONTEND SERVICES</text>
  
  <!-- Web Service -->
  <rect x="380" y="205" width="160" height="100" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="460" cy="240" r="22" fill="#FFE3B3" filter="url(#shadow)"/>
  <text x="462" y="247" text-anchor="middle" font-size="18">🌐</text>
  <text x="460" y="273" text-anchor="middle" class="text-subtitle" font-weight="bold">Web Interface</text>
  <rect x="390" y="280" width="140" height="20" fill="#C8E6C9" rx="3"/>
  <text x="460" y="294" text-anchor="middle" class="text-small">VTK.js</text>
  
  <!-- Static Assets -->
  <rect x="560" y="205" width="160" height="100" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="640" cy="240" r="22" fill="#FFE3B3" filter="url(#shadow)"/>
  <text x="642" y="247" text-anchor="middle" font-size="18">📄</text>
  <text x="640" y="273" text-anchor="middle" class="text-subtitle" font-weight="bold">Static Assets</text>
  <rect x="570" y="280" width="140" height="20" fill="#C8E6C9" rx="3"/>
  <text x="640" y="294" text-anchor="middle" class="text-small">HTML/CSS/JS</text>
  
  <!-- UI Components -->
  <rect x="380" y="325" width="160" height="125" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="460" cy="360" r="22" fill="#FFE3B3" filter="url(#shadow)"/>
  <text x="462" y="367" text-anchor="middle" font-size="18">🎨</text>
  <text x="460" y="393" text-anchor="middle" class="text-subtitle" font-weight="bold">UI Components</text>
  <text x="400" y="415" class="text-small">• File Upload</text>
  <text x="400" y="430" class="text-small">• 3D Volume Viewer</text>
  <text x="400" y="445" class="text-small">• Navigation</text>
  
  <!-- App Lifecycle -->
  <rect x="560" y="325" width="160" height="125" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="640" cy="360" r="22" fill="#FFE3B3" filter="url(#shadow)"/>
  <text x="642" y="367" text-anchor="middle" fill="white" font-size="18">🔄</text>
  <text x="640" y="393" text-anchor="middle" class="text-subtitle" font-weight="bold">App Lifecycle</text>
  <text x="580" y="415" class="text-small">• State Management</text>
  <text x="580" y="430" class="text-small">• Auto-refresh</text>
  <text x="580" y="445" class="text-small">• Real-time Updates</text>
  
  <!-- Features Box -->
  <rect x="380" y="470" width="340" height="105" fill="WHITE" class="border" rx="5"/>
  <text x="550" y="493" text-anchor="middle" class="text-subtitle" font-weight="bold">Frontend Features:</text>
  <text x="395" y="515" class="text-small">✓ ZIP file upload and multi-slice processing</text>
  <text x="395" y="533" class="text-small">✓ Interactive 3D volume visualization</text>
  <text x="395" y="551" class="text-small">✓ Real-time processing history</text>
  
  <!-- Arrow Frontend to Backend -->
  <path d="M 740 350 L 820 350" stroke="#028174" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="780" y="340" text-anchor="middle" class="text-small" font-weight="bold">REST API</text>
  <text x="780" y="368" text-anchor="middle" class="text-small">CORS Enabled</text>
  
  <!-- Arrow Backend to Frontend (Response) -->
  <path d="M 820 380 L 740 380" stroke="#028174" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
  <text x="780" y="398" text-anchor="middle" class="text-small" font-size="10">Response</text>
  
  <!-- Backend Services Container -->
  <rect x="820" y="160" width="490" height="550" fill="#FFF3E0" class="border dashed" rx="10" filter="url(#shadow-strong)"/>
  <text x="1065" y="185" text-anchor="middle" class="text-title" font-size="15">BACKEND SERVICES</text>
  
  <!-- API Gateway (FastAPI) -->
  <rect x="840" y="205" width="190" height="100" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="935" cy="240" r="22" fill="#FFE3B3" filter="url(#shadow)"/>
  <text x="936" y="247" text-anchor="middle" font-size="18">📦</text>
  <text x="935" y="273" text-anchor="middle" class="text-subtitle" font-weight="bold">API Gateway</text>
  <rect x="855" y="280" width="160" height="20" fill="#FFE0B2" rx="3"/>
  <text x="935" y="294" text-anchor="middle" class="text-small">FastAPI Server :8000</text>
  
  <!-- API Endpoints -->
  <rect x="1050" y="205" width="240" height="100" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="1080" cy="240" r="22" fill="#FFE3B3" filter="url(#shadow)"/>
  <text x="1080" y="247" text-anchor="middle" font-size="18">🔌</text>
  <text x="1200" y="233" text-anchor="middle" class="text-subtitle" font-weight="bold">API Endpoints</text>
  <text x="1100" y="260" class="text-small">• /detect (POST) Upload & Process</text>
  <text x="1100" y="277" class="text-small">• /history (GET) - Fetch History</text>
  <text x="1100" y="294" class="text-small">• /outputs/* (Static Files)</text>
  
  <!-- Arrow from API Gateway to ML Pipeline -->
  <path d="M 935 305 L 935 325" stroke="#028174" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- ML Processing Pipeline -->
  <rect x="840" y="325" width="450" height="170" fill="WHITE" class="border" rx="8"/>
  <text x="1065" y="348" text-anchor="middle" class="text-title" font-size="14">ML PROCESSING PIPELINE</text>
  
  <!-- YOLO Detection -->
  <rect x="860" y="365" width="135" height="115" fill="#028174" rx="5" filter="url(#shadow)"/>
  <text x="927" y="388" text-anchor="middle" class="text-white" font-size="13" font-weight="bold">YOLO Model</text>
  <text x="927" y="408" text-anchor="middle" class="text-white-small">best.pt</text>
  <text x="927" y="423" text-anchor="middle" class="text-white-small">best.quant.onnx</text>
  <line x1="875" y1="433" x2="980" y2="433" stroke="white" stroke-width="1"/>
  <text x="927" y="450" text-anchor="middle" class="text-white-small">Object Detection</text>
  <text x="927" y="465" text-anchor="middle" class="text-white-small">Slice Analysis</text>
  
  <!-- DBSCAN Clustering -->
  <rect x="1010" y="365" width="135" height="115" fill="#0AB68B" rx="5" filter="url(#shadow)"/>
  <text x="1077" y="388" text-anchor="middle" class="text-white" font-size="13" font-weight="bold">DBSCAN</text>
  <text x="1077" y="408" text-anchor="middle" class="text-white-small">Clustering</text>
  <line x1="1025" y1="418" x2="1130" y2="418" stroke="white" stroke-width="1"/>
  <text x="1077" y="435" text-anchor="middle" class="text-white-small">3D Grouping</text>
  <text x="1077" y="450" text-anchor="middle" class="text-white-small">Spatial Analysis</text>
  <text x="1077" y="465" text-anchor="middle" class="text-white-small">scikit-learn</text>
  
  <!-- Volume Reconstruction -->
  <rect x="1160" y="365" width="110" height="115" fill="#92DE8B" rx="5" filter="url(#shadow)"/>
  <text x="1215" y="388" text-anchor="middle" class="text-white" font-size="13" font-weight="bold">Volume</text>
  <text x="1215" y="405" text-anchor="middle" class="text-white" font-size="13" font-weight="bold">Generator</text>
  <line x1="1170" y1="415" x2="1260" y2="415" stroke="white" stroke-width="1"/>
  <text x="1215" y="432" text-anchor="middle" class="text-white-small">NumPy</text>
  <text x="1215" y="447" text-anchor="middle" class="text-white-small">Masking</text>
  <text x="1215" y="462" text-anchor="middle" class="text-white-small">Transparency</text>
  
  <!-- ML Pipeline Flow Arrows -->
  <path d="M 995 422 L 1010 422" stroke="#028174" stroke-width="1.2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 1145 422 L 1160 422" stroke="#028174" stroke-width="1.2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Processing Steps -->
  <rect x="840" y="515" width="450" height="80" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <text x="1065" y="535" text-anchor="middle" class="text-subtitle" font-weight="bold">Processing Steps:</text>
  <text x="870" y="557" class="text-small">1️⃣ ZIP Extraction</text>
  <text x="870" y="575" class="text-small">2️⃣ Image Detection</text>
  <text x="1090" y="557" class="text-small">3️⃣ DBSCAN Clustering</text>
  <text x="1090" y="575" class="text-small">4️⃣ 3D Reconstruction</text>
  
  <!-- Arrow from ML Pipeline to Output Management -->
  <path d="M 1065 495 L 1065 515" stroke="#028174" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 950 595 L 950 615" stroke="#028174" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 1180 595 L 1180 615" stroke="#028174" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Output Management -->
  <rect x="840" y="615" width="220" height="80" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="885" cy="650" r="20" fill="#FFE3B3" filter="url(#shadow)"/>
  <text x="886" y="656" text-anchor="middle" font-size="16">💾</text>
  <text x="975" y="643" text-anchor="middle" class="text-subtitle" font-weight="bold">File Storage</text>
  <text x="975" y="663" text-anchor="middle" class="text-small">outputs/*.npy</text>
  <text x="975" y="678" text-anchor="middle" class="text-small">Persistent</text>
  
  <!-- History Tracker -->
  <rect x="1070" y="615" width="220" height="80" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="1115" cy="650" r="20" fill="#FFE3B3" filter="url(#shadow)"/>
  <text x="1116" y="656" text-anchor="middle" font-size="16">📊</text>
  <text x="1200" y="643" text-anchor="middle" class="text-subtitle" font-weight="bold">History Service</text>
  <text x="1200" y="663" text-anchor="middle" class="text-small">history_data.json</text>
  <text x="1200" y="678" text-anchor="middle" class="text-small">Metadata</text>
  
  <!-- Storage & Deployment Layer -->
  <rect x="100" y="730" width="1210" height="150" fill="#FFF3E0" class="border dashed" rx="10" filter="url(#shadow-strong)"/>
  <text x="705" y="755" text-anchor="middle" class="text-title" font-size="15">STORAGE &amp; DEPLOYMENT</text>
  
  <!-- File System -->
  <rect x="120" y="775" width="140" height="85" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="190" cy="805" r="20" fill="#028174" filter="url(#shadow)"/>
  <text x="190" y="811" text-anchor="middle" fill="white" font-size="16">💿</text>
  <text x="190" y="835" text-anchor="middle" class="text-subtitle" font-weight="bold">File System</text>
  <text x="190" y="853" text-anchor="middle" class="text-small" font-size="10">outputs/</text>
  
  <!-- Model Storage -->
  <rect x="280" y="775" width="140" height="85" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="350" cy="805" r="20" fill="#028174" filter="url(#shadow)"/>
  <text x="350" y="811" text-anchor="middle" fill="white" font-size="16">🧠</text>
  <text x="350" y="835" text-anchor="middle" class="text-subtitle" font-weight="bold">Model Files</text>
  <text x="350" y="853" text-anchor="middle" class="text-small" font-size="10">.pt / .onnx</text>
  
  <!-- Volume Cache -->
  <rect x="440" y="775" width="140" height="85" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="510" cy="805" r="20" fill="#028174" filter="url(#shadow)"/>
  <text x="510" y="811" text-anchor="middle" fill="white" font-size="16">📦</text>
  <text x="510" y="835" text-anchor="middle" class="text-subtitle" font-weight="bold">Volume Cache</text>
  <text x="510" y="853" text-anchor="middle" class="text-small" font-size="10">NPY Arrays</text>
  
  <!-- History DB -->
  <rect x="600" y="775" width="140" height="85" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="670" cy="805" r="20" fill="#028174" filter="url(#shadow)"/>
  <text x="670" y="811" text-anchor="middle" fill="white" font-size="16">📋</text>
  <text x="670" y="835" text-anchor="middle" class="text-subtitle" font-weight="bold">History DB</text>
  <text x="670" y="853" text-anchor="middle" class="text-small" font-size="10">JSON Store</text>
  
  <!-- Docker Container -->
  <rect x="760" y="775" width="170" height="85" fill="white" class="border" rx="5" filter="url(#shadow)"/>
  <circle cx="844" cy="805" r="20" fill="#028174" filter="url(#shadow)"/>
  <text x="845" y="810" text-anchor="middle" fill="BLACK" font-size="22">🐳</text>
  <text x="845" y="835" text-anchor="middle" class="text-subtitle" font-weight="bold">Docker</text>
  <text x="845" y="853" text-anchor="middle" class="text-small" font-size="10">Containerized</text>
  
  <!-- Technology Stack -->
  <rect x="950" y="775" width="340" height="85" fill="WHITE" class="border" rx="5" filter="url(#shadow)"/>
  <text x="1120" y="795" text-anchor="middle" class="text-subtitle" font-weight="bold">Technology Stack:</text>
  <text x="970" y="817" class="text-small" font-size="11">• Python 3.x</text>
  <text x="970" y="833" class="text-small" font-size="11">• Ultralytics YOLO</text>
  <text x="970" y="849" class="text-small" font-size="11">• NumPy/scikit-learn</text>
  <text x="1140" y="817" class="text-small" font-size="11">• FastAPI/Uvicorn</text>
  <text x="1140" y="833" class="text-small" font-size="11">• VTK.js</text>
  <text x="1140" y="849" class="text-small" font-size="11">• PIL/Pillow</text>
  
  <!-- Connection arrows Backend to Storage -->
  <path d="M 935 695 L 935 720 L 190 720 L 190 775" stroke="#028174" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 955 695 L 955 720 L 350 720 L 350 775" stroke="#028174" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 1180 695 L 1180 720 L 510 720 L 510 775" stroke="#028174" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 1180 695 L 1180 720 L 670 720 L 670 775" stroke="#028174" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
</svg>