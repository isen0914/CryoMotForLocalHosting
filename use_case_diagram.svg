<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="1000" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1000">
  <defs>
    <style>
      .use-case { fill: #B3D9E8; stroke: #2E5266; stroke-width: 2; }
      .actor-line { stroke: #2E5266; stroke-width: 2; fill: none; }
      .connection { stroke: #2E5266; stroke-width: 2; fill: none; }
      .include-line { stroke: #2E5266; stroke-width: 1.5; fill: none; stroke-dasharray: 5,5; }
      .text-use-case { font-family: Arial, sans-serif; font-size: 14px; fill: #1A1A1A; text-anchor: middle; }
      .text-label { font-family: Arial, sans-serif; font-size: 12px; fill: #2E5266; text-anchor: middle; font-style: italic; }
      .text-title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #1A1A1A; text-anchor: middle; }
      .text-actor { font-family: Arial, sans-serif; font-size: 14px; fill: #1A1A1A; text-anchor: middle; }
      .system-boundary { fill: none; stroke: #1A1A1A; stroke-width: 2; }
    </style>
    
    <marker id="arrowhead-include" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2E5266" />
    </marker>
  </defs>
  
  <!-- System Boundary Box -->
  <rect x="180" y="50" width="650" height="920" class="system-boundary" rx="10"/>
  <text x="505" y="85" class="text-title">CRYOMOT - 3D Bacterial Flagellar Motor Detection System</text>
  
  <!-- Actor: Researcher -->
  <g id="researcher-actor">
    <!-- Head -->
    <circle cx="90" cy="550" r="25" class="use-case" fill="white"/>
    <!-- Body -->
    <line x1="90" y1="575" x2="90" y2="640" class="actor-line"/>
    <!-- Arms -->
    <line x1="90" y1="595" x2="50" y2="615" class="actor-line"/>
    <line x1="90" y1="595" x2="130" y2="615" class="actor-line"/>
    <!-- Legs -->
    <line x1="90" y1="640" x2="60" y2="690" class="actor-line"/>
    <line x1="90" y1="640" x2="120" y2="690" class="actor-line"/>
    <text x="90" y="720" class="text-actor">Researcher</text>
  </g>
  
  <!-- Primary Use Cases (Left Side) -->
  
  <!-- Use Case 1: Upload ZIP Images -->
  <ellipse cx="350" cy="150" rx="110" ry="40" class="use-case"/>
  <text x="350" y="155" class="text-use-case">Upload ZIP Images</text>
  
  <!-- Use Case 2: Process Images -->
  <ellipse cx="350" cy="250" rx="110" ry="40" class="use-case"/>
  <text x="350" y="255" class="text-use-case">Process Images</text>
  
  <!-- Use Case 3: View 3D Volume -->
  <ellipse cx="350" cy="350" rx="110" ry="40" class="use-case"/>
  <text x="350" y="345" class="text-use-case">View 3D Volume</text>
  <text x="350" y="362" class="text-use-case" font-size="12">Visualization</text>
  
  <!-- Use Case 4: Download Results -->
  <ellipse cx="350" cy="450" rx="110" ry="40" class="use-case"/>
  <text x="350" y="455" class="text-use-case">Download Results</text>
  
  <!-- Use Case 5: View History -->
  <ellipse cx="350" cy="550" rx="110" ry="40" class="use-case"/>
  <text x="350" y="545" class="text-use-case">View Processing</text>
  <text x="350" y="562" class="text-use-case" font-size="12">History</text>
  
  <!-- Use Case 6: Delete History -->
  <ellipse cx="350" cy="650" rx="110" ry="40" class="use-case"/>
  <text x="350" y="655" class="text-use-case">Delete History</text>
  
  <!-- Use Case 7: View Instructions -->
  <ellipse cx="350" cy="750" rx="110" ry="40" class="use-case"/>
  <text x="350" y="755" class="text-use-case">View Instructions</text>
  
  <!-- Use Case 8: Export Volume Data -->
  <ellipse cx="350" cy="850" rx="110" ry="40" class="use-case"/>
  <text x="350" y="845" class="text-use-case">Export Volume</text>
  <text x="350" y="862" class="text-use-case" font-size="12">Data (.npy)</text>
  
  <!-- Secondary Use Cases (Right Side - Included) -->
  
  <!-- Use Case: Extract ZIP -->
  <ellipse cx="620" cy="80" rx="100" ry="35" class="use-case"/>
  <text x="620" y="75" class="text-use-case" font-size="13">Extract ZIP</text>
  <text x="620" y="92" class="text-use-case" font-size="13">Files</text>
  
  <!-- Use Case: YOLO Detection -->
  <ellipse cx="620" cy="170" rx="100" ry="35" class="use-case"/>
  <text x="620" y="165" class="text-use-case" font-size="13">YOLO Object</text>
  <text x="620" y="182" class="text-use-case" font-size="13">Detection</text>
  
  <!-- Use Case: DBSCAN Clustering -->
  <ellipse cx="620" cy="260" rx="100" ry="35" class="use-case"/>
  <text x="620" y="255" class="text-use-case" font-size="13">DBSCAN 3D</text>
  <text x="620" y="272" class="text-use-case" font-size="13">Clustering</text>
  
  <!-- Use Case: Generate Volume -->
  <ellipse cx="620" cy="350" rx="100" ry="35" class="use-case"/>
  <text x="620" y="345" class="text-use-case" font-size="13">Generate NumPy</text>
  <text x="620" y="362" class="text-use-case" font-size="13">Volume</text>
  
  <!-- Use Case: Load & Preprocess -->
  <ellipse cx="620" cy="420" rx="100" ry="35" class="use-case"/>
  <text x="620" y="415" class="text-use-case" font-size="13">Load & Resize</text>
  <text x="620" y="432" class="text-use-case" font-size="13">Images (250x250)</text>
  
  <!-- Use Case: Apply Masking -->
  <ellipse cx="620" cy="500" rx="100" ry="35" class="use-case"/>
  <text x="620" y="495" class="text-use-case" font-size="13">Apply Otsu</text>
  <text x="620" y="512" class="text-use-case" font-size="13">Masking</text>
  
  <!-- Use Case: Render VTK -->
  <ellipse cx="620" cy="590" rx="100" ry="35" class="use-case"/>
  <text x="620" y="585" class="text-use-case" font-size="13">Render with</text>
  <text x="620" y="602" class="text-use-case" font-size="13">VTK.js</text>
  
  <!-- Use Case: Save to Storage -->
  <ellipse cx="620" cy="680" rx="100" ry="35" class="use-case"/>
  <text x="620" y="675" class="text-use-case" font-size="13">Save to</text>
  <text x="620" y="692" class="text-use-case" font-size="13">File System</text>
  
  <!-- Use Case: Update History DB -->
  <ellipse cx="620" cy="770" rx="100" ry="35" class="use-case"/>
  <text x="620" y="765" class="text-use-case" font-size="13">Update History</text>
  <text x="620" y="782" class="text-use-case" font-size="13">Database</text>
  
  <!-- Actor to Use Case Connections (Curved lines from actor) -->
  <path d="M 130 550 Q 200 150 240 150" class="connection"/>
  <path d="M 130 550 Q 200 250 240 250" class="connection"/>
  <path d="M 130 560 Q 200 350 240 350" class="connection"/>
  <path d="M 130 570 Q 200 450 240 450" class="connection"/>
  <path d="M 130 580 Q 180 550 240 550" class="connection"/>
  <path d="M 120 630 Q 180 650 240 650" class="connection"/>
  <path d="M 110 650 Q 180 750 240 750" class="connection"/>
  <path d="M 100 660 Q 180 850 240 850" class="connection"/>
  
  <!-- Include Relationships (Dashed lines with arrows) -->
  
  <!-- Upload ZIP includes Extract ZIP -->
  <path d="M 455 135 L 525 95" class="include-line" marker-end="url(#arrowhead-include)"/>
  <text x="490" y="108" class="text-label">&lt;&lt;include&gt;&gt;</text>
  
  <!-- Process Images includes YOLO Detection -->
  <path d="M 460 240 L 530 185" class="include-line" marker-end="url(#arrowhead-include)"/>
  <text x="495" y="205" class="text-label">&lt;&lt;include&gt;&gt;</text>
  
  <!-- YOLO Detection includes DBSCAN Clustering -->
  <path d="M 620 205 L 620 225" class="include-line" marker-end="url(#arrowhead-include)"/>
  <text x="660" y="220" class="text-label">&lt;&lt;include&gt;&gt;</text>
  
  <!-- DBSCAN includes Generate Volume -->
  <path d="M 620 295 L 620 315" class="include-line" marker-end="url(#arrowhead-include)"/>
  <text x="660" y="310" class="text-label">&lt;&lt;include&gt;&gt;</text>
  
  <!-- Process Images includes Load & Preprocess -->
  <path d="M 430 270 L 540 405" class="include-line" marker-end="url(#arrowhead-include)"/>
  <text x="485" y="330" class="text-label">&lt;&lt;include&gt;&gt;</text>
  
  <!-- Load & Preprocess includes Apply Masking -->
  <path d="M 620 455 L 620 465" class="include-line" marker-end="url(#arrowhead-include)"/>
  <text x="660" y="463" class="text-label">&lt;&lt;include&gt;&gt;</text>
  
  <!-- View 3D Volume includes Render VTK -->
  <path d="M 450 370 L 530 570" class="include-line" marker-end="url(#arrowhead-include)"/>
  <text x="490" y="465" class="text-label">&lt;&lt;include&gt;&gt;</text>
  
  <!-- Download Results includes Save to Storage -->
  <path d="M 455 465 L 525 665" class="include-line" marker-end="url(#arrowhead-include)"/>
  <text x="490" y="560" class="text-label">&lt;&lt;include&gt;&gt;</text>
  
  <!-- View History includes Update History DB -->
  <path d="M 455 565 L 525 755" class="include-line" marker-end="url(#arrowhead-include)"/>
  <text x="490" y="655" class="text-label">&lt;&lt;include&gt;&gt;</text>
  
  <!-- Delete History includes Update History DB -->
  <path d="M 455 665 L 525 755" class="include-line" marker-end="url(#arrowhead-include)"/>
  <text x="490" y="705" class="text-label">&lt;&lt;include&gt;&gt;</text>
  
  <!-- Export Volume includes Generate Volume -->
  <path d="M 450 840 Q 550 620 620 385" class="include-line" marker-end="url(#arrowhead-include)"/>
  <text x="520" y="605" class="text-label">&lt;&lt;include&gt;&gt;</text>
  

  
</svg>
